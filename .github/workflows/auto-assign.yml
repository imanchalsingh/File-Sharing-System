name: Auto Assign PR Author

on:
  pull_request_target:
    types: [opened]

permissions:
  pull-requests: write

jobs:
  auto-assign:
    runs-on: ubuntu-latest

    steps:
      - name: Auto assign PR author
        uses: toshimaru/auto-author-assign@v2.0.0
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
